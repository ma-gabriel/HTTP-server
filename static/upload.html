<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>File Upload Form</title>
</head>
<body>
    <h1>Upload a File</h1>
    <form method="POST" enctype="multipart/form-data">
        <label for="fileInput">Choose a file to upload:</label><br />
        <input type="file" id="fileInput" name="file" multiple/><br /><br />
        <input type="submit" value="Upload File" />
    </form>
<input type="text" id="filename"/>
<button id="deleteBtn">Delete File</button>

  <script>
    document.getElementById('deleteBtn').addEventListener('click', function() {
      fetch('/delete/' +  document.getElementById('filename').value, {
        method: 'DELETE'
      })
      .then(response => {
        if (response.status == 204) alert('Deleted successfully');
        else
            alert('DELETE failed with status: ' + response.status);
      })
      .catch(err => alert('Error: ' + err));
    });
  </script>
</body>
</html>
