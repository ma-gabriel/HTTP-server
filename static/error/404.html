  <script>
  document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM loaded, checking banner status");
    
    // Get elements with error checking
    const banner = document.getElementById('banner');
    const closeBtn = document.querySelector('.popup-banner_close');
    
    // Check if elements exist
    if (!banner) {
      console.error("Banner element with ID 'banner' not found");
      return;
    }
    
    if (!closeBtn) {
      console.error("Close button with class 'popup-banner_close' not found");
      return;
    }
    
    // Get banner name from data attribute (or use default if not present)
    const bannerName = banner.getAttribute('data-banner-name') || 'default';
    console.log("Current banner name:", bannerName);
    
    // Check if this specific banner has been closed
    const bannerKey = `bannerClosed_${bannerName}`;
    const bannerClosed = localStorage.getItem(bannerKey);
    
    console.log(`Banner state for "${bannerName}" in localStorage:`, bannerClosed);
    
    // Show banner if it hasn't been closed before
    if (bannerClosed !== 'true') {
      console.log(`Setting banner "${bannerName}" to display:flex`);
      banner.style.display = 'flex';
    } else {
      console.log(`Banner "${bannerName}" should remain hidden`);
    }
    
    // Add event listener to close button
    closeBtn.addEventListener('click', function() {
      console.log(`Close button clicked for banner "${bannerName}"`);
      banner.style.display = 'none';
      
      // Set permanent closed state for this specific banner
      localStorage.setItem(bannerKey, 'true');
      
      console.log(`Banner "${bannerName}" closed and state permanently saved`);
    });
  });
  </script><script>
  
  // Initialising the canvas
  var canvas = document.querySelector('canvas'),
      ctx = canvas.getContext('2d');
  
  // Setting the width and height of the canvas
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // Setting up the letters
  var letters = 'METRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOMEMETRONOME';
  letters = letters.split('');
  
  // Setting up the columns
  var fontSize = 14,
      columns = canvas.width / fontSize;
  
  // Setting up the drops
  var drops = [];
  for (var i = 0; i < columns; i++) {
    drops[i] = 1;
  }
  
  // Setting up the draw function
  function draw() {
    ctx.fillStyle = 'rgba(15, 47, 54, 0.1)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < drops.length; i++) {
      var text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillStyle = '#82FB8E';
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      drops[i]++;
      if (drops[i] * fontSize > canvas.height && Math.random() > .90) {
        drops[i] = 0;
      }
    }
  }
  
  // Loop the animation
  setInterval(draw, 36);
  
  </script></body></html>
